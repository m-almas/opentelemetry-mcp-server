name: Security Scan

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: "0 10 * * *"  # Daily at 10 AM UTC

jobs:
  trivy:
    permissions:
      contents: read
      actions: read
      security-events: write
      pull-requests: write
    uses: traceloop/.github/.github/workflows/reuse-trivy.yml@main
    with:
      image_name: opentelemetry-mcp-server
      docker_context: "."
      platforms: "amd64,arm64"


name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        types: [opened, synchronize]

permissions:
  contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Setup UV
              uses: astral-sh/setup-uv@v7
              with:
                  version: "latest"
                  enable-cache: true
            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13"
            - name: Install dependencies
              run: uv sync --dev
            - name: Lint with Ruff
              run: uv run ruff check --output-format=github
            - name: Lint with Mypy
              run: uv run mypy .
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Setup UV
              uses: astral-sh/setup-uv@v7
              with:
                  version: "latest"
                  enable-cache: true
            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13"
            - name: Install dependencies
              run: uv sync --dev
            - name: Test with pytest
              run: uv run pytest
    build-test:
        needs: test
        runs-on: ubuntu-latest
        permissions:
            contents: read
            actions: read
            pull-requests: write
            security-events: write
        strategy:
            matrix:
                platform: [amd64, arm64]
                include:
                    - platform: amd64
                      runs-on: ubuntu-latest
                      docker-platform: linux/amd64
                    - platform: arm64
                      runs-on: Linux-ARM64
                      docker-platform: linux/arm64
        steps:
            - uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Docker Build
              uses: docker/build-push-action@v6
              with:
                  platforms: ${{ matrix.docker-platform }}
                  context: .
                  load: true
                  push: false
                  tags: opentelemetry-mcp-server:${{ github.sha }}-${{ matrix.platform }}
            - name: Trivy Scan
              uses: traceloop/.github/actions/ci-action-trivy@main
              with:
                image_ref: opentelemetry-mcp-server:${{ github.sha }}-${{ matrix.platform }}
                image_name: opentelemetry-mcp-server-${{ matrix.platform }}
                scanners: secret,vuln
                severity: CRITICAL,HIGH
